# Small grid: quick exploratory run (few methods, small axes).
base:
  model: ResNet18
  epochs: 20
  selection_epochs: 5
  batch: 128
  lr: 0.1
  workers: 2
  test_interval: 0
  balance: true
  data_path: data
  class_ids: [3, 5]
  imbalance:
    ratio: 1.0
  label_noise:
    ratio: 0.0
    type: uniform
  feature_noise:
    ratio: 0.0
    sigma: 0.1

grid:
  selection: [Uniform, Uncertainty, Forgetting, GraNd]
  fraction: [0.1, 0.3]
  label_noise.ratio: [0.0, 0.4]

seeds: [0, 1]
overwrite: false
