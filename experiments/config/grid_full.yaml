# Full grid: all DeepCore methods x noise x imbalance x fractions x seeds.
# Cluster-sized — trim `grid` before running on a single box.

base:
  model: ResNet18
  epochs: 50
  selection_epochs: 10
  batch: 128
  lr: 0.1
  workers: 4
  test_interval: 0
  balance: true
  data_path: data
  class_ids: [3, 5]
  imbalance:
    ratio: 1.0
    majority_class: 0
  label_noise:
    ratio: 0.0
    type: uniform
  feature_noise:
    ratio: 0.0
    sigma: 0.1

grid:
  selection: [
    Uniform,
    Herding,
    kCenterGreedy,
    Forgetting,
    GraNd,
    Cal,
    Craig,
    GradMatch,
    Glister,
    ContextualDiversity,
    DeepFool,
    Submodular,
    Uncertainty,
    CCS,
    ClasswiseCCS,
  ]
  fraction: [0.05, 0.1, 0.3, 0.5]
  label_noise.ratio: [0.0, 0.2, 0.4, 0.6]
  label_noise.type: [uniform, class_dependent]
  imbalance.ratio: [1.0, 0.3, 0.1]

seeds: [0, 1, 2]
overwrite: false
